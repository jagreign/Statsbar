<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .stats-wrapper {
    display: flex;
    justify-content: center;
    align-items: stretch;
    gap: 0;
    width: 100%;
    max-width: 820px;
    border: 1px solid #e8e8e4;
    border-radius: 16px;
    overflow: hidden;
  }

  .stat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    text-align: center;
    position: relative;
    transition: background 0.2s ease;
  }

  .stat:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 20%;
    height: 60%;
    width: 1px;
    background: #e8e8e4;
  }

  .stat:hover {
    background: #fafaf8;
  }

  .stat-number {
    font-family: Arial, sans-serif;
    font-weight: 800;
    font-size: 2.4rem;
    color: #1a1a1a;
    line-height: 1;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  .stat-label {
    font-family: Arial, sans-serif;
    font-weight: 400;
    font-size: 0.72rem;
    color: #888880;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 1.4;
  }

  .stat-number span {
    color: #c85a1e;
  }

  @media (max-width: 560px) {
    .stats-wrapper {
      flex-wrap: wrap;
      border-radius: 12px;
    }
    .stat {
      flex: 0 0 50%;
      padding: 1.5rem 0.75rem;
    }
    .stat:not(:last-child)::after {
      display: none;
    }
    .stat-number {
      font-size: 1.9rem;
    }
  }
</style>
</head>
<body>
  <div class="stats-wrapper">
    <div class="stat">
      <div class="stat-number">300<span>+</span></div>
      <div class="stat-label">Videos<br>Delivered</div>
    </div>
    <div class="stat">
      <div class="stat-number">100K<span>+</span></div>
      <div class="stat-label">Organic<br>Views</div>
    </div>
    <div class="stat">
      <div class="stat-number">40<span>%</span></div>
      <div class="stat-label">Engagement<br>Growth</div>
    </div>
    <div class="stat">
      <div class="stat-number">7<span>+</span></div>
      <div class="stat-label">Years<br>Experience</div>
    </div>
    <div class="stat">
      <div class="stat-number">15<span>+</span></div>
      <div class="stat-label">Clients<br>Served</div>
    </div>
  </div>


</body></html>
